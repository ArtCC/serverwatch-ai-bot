services:
  bot:
    image: ghcr.io/artcc/serverwatch-ai-bot:latest
    container_name: serverwatch-bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      GLANCES_BASE_URL: ${GLANCES_BASE_URL:-http://glances:61208/api/4}
      GLANCES_REQUEST_TIMEOUT_SECONDS: ${GLANCES_REQUEST_TIMEOUT_SECONDS:-10.0}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
      BOT_LOG_LEVEL: ${BOT_LOG_LEVEL:-INFO}
      BOT_LOCALE: ${BOT_LOCALE:-en}
      TZ: ${TZ:-UTC}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/serverwatch.db}
      ALERT_CHECK_INTERVAL_SECONDS: ${ALERT_CHECK_INTERVAL_SECONDS:-60}
      ALERT_COOLDOWN_SECONDS: ${ALERT_COOLDOWN_SECONDS:-300}
      ALERT_DEFAULT_CPU_THRESHOLD: ${ALERT_DEFAULT_CPU_THRESHOLD:-85}
      ALERT_DEFAULT_RAM_THRESHOLD: ${ALERT_DEFAULT_RAM_THRESHOLD:-85}
      ALERT_DEFAULT_DISK_THRESHOLD: ${ALERT_DEFAULT_DISK_THRESHOLD:-90}
      ALERT_CONSECUTIVE_BREACHES: ${ALERT_CONSECUTIVE_BREACHES:-2}
      ALERT_RECOVERY_MARGIN_PERCENT: ${ALERT_RECOVERY_MARGIN_PERCENT:-5}
      ALERT_CONTEXT_WINDOW_SAMPLES: ${ALERT_CONTEXT_WINDOW_SAMPLES:-3}
    depends_on:
      glances:
        condition: service_started
    volumes:
      - ${DATA_PATH:-/opt/docker/serverwatch-ai-bot/data}:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  glances:
    image: nicolargo/glances:latest
    container_name: serverwatch-glances
    restart: unless-stopped
    pid: host
    environment:
      GLANCES_OPT: "-w"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Uncomment to show host OS details instead of container OS details
      # - /etc/os-release:/etc/os-release:ro
    ports:
      - "127.0.0.1:61208:61208"
    # For nvidia GPUs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]