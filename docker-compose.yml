services:
  bot:
    image: ghcr.io/artcc/serverwatch-ai-bot:latest
    container_name: serverwatch-bot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      # For host-based Glances (recommended): http://<host-ip>:61208/api/4
      # For Docker-based Glances: http://glances:61208/api/4
      GLANCES_BASE_URL: ${GLANCES_BASE_URL:-http://glances:61208/api/4}
      GLANCES_REQUEST_TIMEOUT_SECONDS: ${GLANCES_REQUEST_TIMEOUT_SECONDS:-10.0}
      GLANCES_LOG_FULL_PAYLOAD: ${GLANCES_LOG_FULL_PAYLOAD:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-}
      BOT_LOG_LEVEL: ${BOT_LOG_LEVEL:-INFO}
      BOT_LOCALE: ${BOT_LOCALE:-en}
      TZ: ${TZ:-UTC}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/serverwatch.db}
      ALERT_CHECK_INTERVAL_SECONDS: ${ALERT_CHECK_INTERVAL_SECONDS:-60}
      ALERT_COOLDOWN_SECONDS: ${ALERT_COOLDOWN_SECONDS:-300}
      ALERT_DEFAULT_CPU_THRESHOLD: ${ALERT_DEFAULT_CPU_THRESHOLD:-85}
      ALERT_DEFAULT_RAM_THRESHOLD: ${ALERT_DEFAULT_RAM_THRESHOLD:-85}
      ALERT_DEFAULT_DISK_THRESHOLD: ${ALERT_DEFAULT_DISK_THRESHOLD:-90}
      ALERT_CONSECUTIVE_BREACHES: ${ALERT_CONSECUTIVE_BREACHES:-2}
      ALERT_RECOVERY_MARGIN_PERCENT: ${ALERT_RECOVERY_MARGIN_PERCENT:-5}
      ALERT_CONTEXT_WINDOW_SAMPLES: ${ALERT_CONTEXT_WINDOW_SAMPLES:-3}
      CHAT_CONTEXT_MAX_TURNS: ${CHAT_CONTEXT_MAX_TURNS:-8}
      CHAT_CONTEXT_MAX_CHARS: ${CHAT_CONTEXT_MAX_CHARS:-10000}
      CHAT_CONTEXT_RETENTION_MESSAGES: ${CHAT_CONTEXT_RETENTION_MESSAGES:-200}
    # Uncomment depends_on if using the Docker-based Glances service below.
    # depends_on:
    #   glances:
    #     condition: service_started
    volumes:
      - ${DATA_PATH:-/opt/docker/serverwatch-ai-bot/data}:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─── Optional: Docker-based Glances ────────────────────────────────
  # Uncomment the block below if you prefer running Glances inside Docker
  # instead of on the host.  When using host-based Glances (recommended),
  # point GLANCES_BASE_URL to your host IP and leave this block commented.
  #
  # glances:
  #   image: nicolargo/glances:latest
  #   container_name: serverwatch-glances
  #   restart: unless-stopped
  #   pid: host
  #   gpus: all
  #   environment:
  #     GLANCES_OPT: "-w"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     # - /etc/os-release:/etc/os-release:ro
  #   devices:
  #     - /dev/dri:/dev/dri
  #   ports:
  #     - "127.0.0.1:61208:61208"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]